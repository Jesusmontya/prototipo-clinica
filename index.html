<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - SistemaGestion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            
            
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #0d0d0d, #222222);
            background-size: 400% 400%;
            animation: gradientDark 15s ease infinite;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        @keyframes gradientDark {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-login {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }

        .form-control-glass {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 0.75rem;
            padding: 0.8rem;
            font-weight: 600;
        }

        .form-control-glass:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #ffffff;
            color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-glass {
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 0.75rem;
            padding: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-glass:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.4);
            background: #f8f9fa;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .sub-text {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <div class="glass-login">
        <div class="logo-text">SistemaGestion</div>
        <div class="sub-text">Panel de Control Clínico</div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small text-white-50">Nombre de Usuario</label>
                <input type="text" class="form-control form-control-glass" id="userInput" value="Dr. Montoya" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-white-50">Contraseña</label>
                <input type="password" class="form-control form-control-glass" value="admin123" required>
            </div>
            
            <button type="submit" class="btn btn-glass w-100 mb-3" id="btnLogin">Acceder al Sistema</button>
            
            <div class="text-center">
                <p class="text-white-50 small">Prototipo de Validación v1.0</p>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnLogin');
            const user = document.getElementById('userInput').value;
            
            // Guardamos el nombre para que el Dashboard lo use (opcional)
            localStorage.setItem('usuarioSistema', user);
            
            // Efecto visual de carga
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verificando...';
            btn.disabled = true;
            
            // Simulación de acceso instantáneo para el prototipo
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);
        });
    </script>
</body>
</html>
